// HELPERS
// ═══════════════════════════════════════════════════════════════
function findPillarForProcess(procId) {
  for (const p of PILLARS) {
    if (p.processes.find(pr => pr.id === procId)) return p;
  }
  return null;
}

function findProcessByName(name) {
  for (const pillar of PILLARS) {
    const proc = pillar.processes.find(p => p.name === name);
    if (proc) return { proc, pillar };
  }
  return null;
}

function getTaggedProcesses(role) {
  const results = new Map();
  // From role.processes (by name)
  for (const procName of (role.processes || [])) {
    const found = findProcessByName(procName);
    if (found) results.set(found.proc.id, found);
  }
  // Also scan all process.roles arrays for this role's title
  for (const pillar of PILLARS) {
    for (const proc of pillar.processes) {
      if (proc.roles?.includes(role.title)) {
        results.set(proc.id, { proc, pillar });
      }
    }
  }
  return [...results.values()];
}

function groupByPillar(procList) {
  const map = new Map();
  for (const { proc, pillar } of procList) {
    if (!map.has(pillar.id)) map.set(pillar.id, { pillar, processes: [] });
    map.get(pillar.id).processes.push(proc);
  }
  return [...map.values()];
}

// CHEVRON BAR
// ═══════════════════════════════════════════════════════════════
function ChevronBar({ activePillar, onPillarClick }) {
  const A = 18;
  return (
    <div style={{ display:'flex', height:60, flexShrink:0, padding:'0 20px', background:'#1E293B', alignItems:'stretch' }}>
      {PILLARS.map((p, i) => {
        const isFirst = i === 0, isLast = i === PILLARS.length - 1;
        const isActive = !activePillar || activePillar === p.id;
        const clip = isFirst
          ? `polygon(0 0, calc(100% - ${A}px) 0, 100% 50%, calc(100% - ${A}px) 100%, 0 100%)`
          : isLast
          ? `polygon(${A}px 0, 100% 0, 100% 100%, ${A}px 100%, 0 50%)`
          : `polygon(${A}px 0, calc(100% - ${A}px) 0, 100% 50%, calc(100% - ${A}px) 100%, ${A}px 100%, 0 50%)`;
        return (
          <div key={p.id} onClick={() => onPillarClick(activePillar === p.id ? null : p.id)}
            style={{
              flex:1, clipPath:clip,
              marginLeft: i > 0 ? -A : 0,
              zIndex: PILLARS.length - i,
              background: isActive ? p.color : '#334155',
              display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center',
              cursor:'pointer', userSelect:'none',
              paddingLeft: i > 0 ? A + 6 : 8,
              paddingRight: !isLast ? A + 6 : 8,
              transition:'background 0.15s',
            }}>
            <div style={{ fontSize:13, fontWeight:900, color: isActive ? '#fff' : 'rgba(255,255,255,0.4)', letterSpacing:'0.5px' }}>{p.name}</div>

        );
      })}
    </div>
  );
}

            <h3 style={{ fontSize:12, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:14 }}>👤 Roles Involved</h3>
            <div style={{ display:'flex', flexWrap:'wrap', gap:10 }}>
              {proc.roles.map((r, i) => {
                // find matching role object
                let foundRole = null, foundGroup = null;
                for (const g of ROLE_GROUPS) {
                  const match = g.roles.find(rl => rl.title === r);
                  if (match) { foundRole = match; foundGroup = g; break; }

                return (
                  <div key={i}
                    onClick={() => foundRole && onNavigateToRole && onNavigateToRole({ type:'role', role:foundRole, group:foundGroup })}

                      display:'flex', alignItems:'center', gap:8, padding:'10px 14px',

                    <span style={{ fontSize:18 }}>{foundRole?.emoji || '👤'}</span>
                    <div>
                      <div style={{ fontSize:12, fontWeight:700, color:pillar.dark }}>{r}</div>
                      {foundRole && <div style={{ fontSize:10, color:'#94A3B8' }}>View role →</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// HEADER with breadcrumbs
// ═══════════════════════════════════════════════════════════════
function Header({ navStack, view, onCrumbClick }) {
  // Build crumbs
  const crumbs = [{ label:'Supply Chain', idx:-1 }];
  if (view !== 'home') {
    crumbs.push({ label: view === 'process' ? '⬡ Process Map' : '👤 Role View', idx:0 });
  }
  navStack.forEach((item, i) => {
    if (item.type === 'pillar') {
      crumbs.push({ label: item.pillar.name, idx: i });
    } else if (item.type === 'process') {
      crumbs.push({ label: item.pillar.name, idx: null });
      crumbs.push({ label: item.proc.name, idx: i });
    } else if (item.type === 'processFlow') {
      crumbs.push({ label: item.pillar.name, idx: null });
      crumbs.push({ label: item.proc.name + ' — Flow', idx: i });
    } else if (item.type === 'stepDetail') {
      // pillar + proc already shown by the processFlow crumb above; just add step
      crumbs.push({ label: 'Step ' + item.stepNum + ': ' + item.step.name, idx: i });
    } else {
      crumbs.push({ label: item.group.label, idx: null });
      crumbs.push({ label: item.role.title, idx: i });
    }
  });

  const isDeep = navStack.length > 0;

  return (
    <header style={{
      height:56, background:'linear-gradient(135deg, #0F172A 0%, #1E3A5F 100%)',
      display:'flex', alignItems:'center', padding:'0 22px', gap:12, flexShrink:0,
      boxShadow:'0 2px 12px rgba(0,0,0,0.28)',
    }}>
      {/* Logo */}
      <button onClick={() => onCrumbClick(-1)} style={{ display:'flex', alignItems:'center', gap:9, flexShrink:0 }}>
        <div style={{ width:30, height:30, borderRadius:7, background:'linear-gradient(135deg, #3B82F6, #8B5CF6)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, fontWeight:800, color:'#fff' }}>L</div>
        <div style={{ textAlign:'left' }}>
          <div style={{ color:'#fff', fontSize:14, fontWeight:800, letterSpacing:'-0.3px', lineHeight:1.1 }}>The Link 2.0</div>
          <div style={{ color:'rgba(255,255,255,0.4)', fontSize:10 }}>Supply Chain Hub</div>
        </div>
      </button>

      <div style={{ width:1, height:26, background:'rgba(255,255,255,0.1)', margin:'0 4px', flexShrink:0 }} />

      {/* Breadcrumbs */}
      <div style={{ display:'flex', alignItems:'center', gap:0, flexWrap:'nowrap', overflow:'hidden', flex:1 }}>
        {crumbs.map((crumb, ci) => {
          const isLast = ci === crumbs.length - 1;
          const isClickable = !isLast && crumb.idx !== null;
          return (
            <React.Fragment key={ci}>
              {ci > 0 && (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ flexShrink:0, margin:'0 1px' }}>
                  <path d="M9 18l6-6-6-6" stroke="rgba(255,255,255,0.25)" strokeWidth="2" strokeLinecap="round"/>
                </svg>
              )}
              <button
                className="crumb-btn"
                onClick={() => isClickable && onCrumbClick(crumb.idx)}
                style={{
                  fontSize: isLast ? 13 : 12,
                  fontWeight: isLast ? 700 : 500,
                  color: isLast ? '#fff' : 'rgba(255,255,255,0.5)',
                  cursor: isClickable ? 'pointer' : 'default',
                  whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                  maxWidth: isLast ? 260 : 120,
                  flexShrink: isLast ? 0 : 1,
                }}
              >
                {crumb.label}
              </button>
            </React.Fragment>
          );
        })}
      </div>

      {!isDeep && (
        <span style={{ background:'rgba(59,130,246,0.2)', border:'1px solid rgba(59,130,246,0.35)', color:'#93C5FD', fontSize:10, fontWeight:700, padding:'2px 9px', borderRadius:20, letterSpacing:'0.6px', flexShrink:0 }}>APQC PCF</span>
      )}
    </header>
  );
}

// ═══════════════════════════════════════════════════════════════
// TAB BAR
// ═══════════════════════════════════════════════════════════════
function TabBar({ view, onViewChange }) {
  return (
    <div style={{ background:'#fff', borderBottom:'1px solid #E2E8F0', display:'flex', alignItems:'center', justifyContent:'center', padding:'0 24px', gap:6, height:50, flexShrink:0 }}>
      {[['process','⬡ Process Map'],['role','👤 Role View']].map(([id, label]) => {
        const active = view === id;
        return (
          <button key={id} onClick={() => onViewChange(id)} style={{
            padding:'7px 28px', borderRadius:9, fontSize:14, fontWeight: active ? 700 : 500,
            color: active ? '#fff' : '#64748B',
            background: active ? '#1D4ED8' : 'transparent',
            border: active ? 'none' : '1.5px solid #E2E8F0',
            transition:'all .14s',
          }}>{label}</button>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PILLAR PROCESS NAV (two-row nav for process flow page)
// ═══════════════════════════════════════════════════════════════
function PillarProcessNav({ activePillar, activeProc, onPillarChange, onProcChange }) {
  return (
    <div style={{ background:'#fff', borderBottom:'1px solid #E2E8F0', flexShrink:0 }}>
      <div style={{ display:'flex', gap:4, padding:'8px 20px 6px', overflowX:'auto' }}>
        {PILLARS.map(p => (
          <button key={p.id} onClick={() => onPillarChange(p)} style={{
            padding:'4px 14px', borderRadius:20, fontSize:12, fontWeight:700,
            background: activePillar.id===p.id ? p.color : '#F1F5F9',
            color: activePillar.id===p.id ? '#fff' : '#64748B',
            border: activePillar.id===p.id ? 'none' : '1px solid #E2E8F0',
            flexShrink:0, transition:'all .12s', cursor:'pointer',
          }}>{p.name}</button>
        ))}
      </div>
      <div style={{ display:'flex', gap:4, padding:'4px 20px 8px', overflowX:'auto' }}>
        {activePillar.processes.map(proc => (
          <button key={proc.id} onClick={() => onProcChange(proc)} style={{
            padding:'4px 12px', borderRadius:8, fontSize:12, whiteSpace:'nowrap',
            fontWeight: activeProc.id===proc.id ? 700 : 500,
            background: activeProc.id===proc.id ? activePillar.light : 'transparent',
            color: activeProc.id===proc.id ? activePillar.dark : '#64748B',
            border: activeProc.id===proc.id ? `1.5px solid ${activePillar.color}50` : '1.5px solid transparent',
            flexShrink:0, transition:'all .12s', cursor:'pointer',
          }}>{proc.name}</button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PROCESS FLOW PAGE — chevron design
// ═══════════════════════════════════════════════════════════════
function ProcessFlowPage({ proc, pillar, onNavigate, onUpdateCurrent }) {
  function handlePillarChange(newPillar) {
    onUpdateCurrent({ proc:newPillar.processes[0], pillar:newPillar });
  }
  function handleProcChange(newProc) {
    onUpdateCurrent({ proc:newProc });
  }
  const steps = proc.steps || [];
  const A = 30; // arrow point size
  const W = 210; // chevron width

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden' }}>
      <PillarProcessNav activePillar={pillar} activeProc={proc} onPillarChange={handlePillarChange} onProcChange={handleProcChange} />
      <div style={{ flex:1, overflowY:'auto', padding:'24px 28px' }}>
        {/* Process header */}
        <div style={{
          background:`linear-gradient(135deg, ${pillar.dark} 0%, ${pillar.color} 100%)`,
          borderRadius:12, padding:'18px 24px', marginBottom:24, color:'#fff',
        }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
            <span style={{ background:'rgba(255,255,255,0.18)', fontSize:10, fontWeight:700, padding:'2px 9px', borderRadius:20 }}>{pillar.name}</span>
            <span style={{ fontSize:10, color:'rgba(255,255,255,0.55)' }}>Process Flow — click any step to drill in</span>
          </div>
          <h1 style={{ fontSize:20, fontWeight:800, lineHeight:1.2, marginBottom:4 }}>{proc.name}</h1>
          <p style={{ fontSize:12, color:'rgba(255,255,255,0.75)', lineHeight:1.55, maxWidth:680 }}>{proc.desc}</p>
        </div>

        {steps.length > 0 ? (
          <div style={{ overflowX:'auto', paddingBottom:4 }}>
            {/* ── Chevron row ── */}
            <div style={{ display:'flex', minWidth:'max-content' }}>
              {steps.map((step, i) => {
                const isFirst = i===0, isLast = i===steps.length-1;
                const clip = isFirst
                  ? `polygon(0 0, calc(100% - ${A}px) 0, 100% 50%, calc(100% - ${A}px) 100%, 0 100%)`
                  : isLast
                  ? `polygon(${A}px 0, 100% 0, 100% 100%, ${A}px 100%, 0 50%)`
                  : `polygon(${A}px 0, calc(100% - ${A}px) 0, 100% 50%, calc(100% - ${A}px) 100%, ${A}px 100%, 0 50%)`;
                return (
                  <div key={step.id}
                    onClick={() => onNavigate({ type:'stepDetail', step, stepNum:i+1, proc, pillar })}
                    style={{
                      width:W, height:120, clipPath:clip,
                      marginLeft: i>0 ? -A : 0,
                      zIndex: steps.length - i, position:'relative',
                      background: `linear-gradient(160deg, ${pillar.dark} 0%, ${pillar.color} 100%)`,
                      display:'flex', flexDirection:'column', justifyContent:'center',
                      paddingLeft: isFirst ? 20 : A+12,
                      paddingRight: isLast ? 20 : A+12,
                      cursor:'pointer', transition:'filter .15s',
                    }}
                    onMouseEnter={e => e.currentTarget.style.filter='brightness(1.15)'}
                    onMouseLeave={e => e.currentTarget.style.filter=''}
                  >
                    <div style={{ fontSize:9, fontWeight:800, color:'rgba(255,255,255,0.5)', letterSpacing:'1.2px', marginBottom:5, textTransform:'uppercase' }}>Step {i+1}</div>
                    <div style={{ fontSize:12, fontWeight:800, color:'#fff', lineHeight:1.3, marginBottom:7 }}>{step.name}</div>
                    <div style={{ fontSize:9, color:'rgba(255,255,255,0.5)', display:'flex', alignItems:'center', gap:3 }}>
                      <span>{step.roles?.length} role{step.roles?.length!==1?'s':''}</span>
                      <span>·</span>
                      <span>drill in ↓</span>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* ── Detail panels below chevrons ── */}
            <div style={{
              display:'flex', minWidth:'max-content',
              border:'1px solid #E2E8F0', borderTop:'3px solid #F1F5F9',
              borderRadius:'0 0 12px 12px', background:'#fff', overflow:'hidden',
            }}>
              {steps.map((step, i) => {
                const subSteps = STEP_DETAILS[proc.id + '.' + step.id] || [];
                return (
                  <div key={step.id} style={{
                    width:W, flexShrink:0, padding:'14px 16px',
                    borderLeft: i>0 ? '1px solid #F1F5F9' : 'none',
                  }}>
                    {/* Roles */}
                    <div style={{ fontSize:9, fontWeight:800, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:8 }}>Roles</div>
                    {(step.roles||[]).map((r, ri) => {
                      let found=null, grp=null;
                      for (const g of ROLE_GROUPS) { const m=g.roles.find(rl=>rl.title===r); if(m){found=m;grp=g;break;} }
                      return (
                        <div key={ri} onClick={() => found && onNavigate({type:'role',role:found,group:grp})}
                          style={{ display:'flex', alignItems:'center', gap:5, marginBottom:5, cursor:found?'pointer':'default' }}>
                          <span style={{ fontSize:13 }}>{found?.emoji||'👤'}</span>
                          <span style={{ fontSize:11, color:'#1E293B', fontWeight:500, lineHeight:1.3 }}>{r}</span>
                        </div>
                      );
                    })}
                    {/* Sub-step preview */}
                    {subSteps.length > 0 && (
                      <>
                        <div style={{ height:1, background:'#F1F5F9', margin:'10px 0 8px' }} />
                        <div style={{ fontSize:9, fontWeight:800, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:6 }}>Activities</div>
                        {subSteps.map((ss, si) => (
                          <div key={si} style={{ display:'flex', alignItems:'flex-start', gap:4, marginBottom:5 }}>
                            <span style={{ color:pillar.color, fontWeight:800, fontSize:11, flexShrink:0, lineHeight:1.45, marginTop:0 }}>›</span>
                            <span style={{ fontSize:10, color:'#64748B', lineHeight:1.45 }}>{ss.n}</span>
                          </div>
                        ))}
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <p style={{ color:'#94A3B8', fontSize:13 }}>No steps defined for this process yet.</p>
        )}

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginTop:24 }}>
          {proc.kpis?.length > 0 && (
            <div style={{ background:'#fff', borderRadius:12, padding:18, border:'1px solid #E2E8F0' }}>
              <h3 style={{ fontSize:11, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:12 }}>📊 Key KPIs</h3>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {proc.kpis.map((k,i) => (
                  <span key={i} style={{ fontSize:11, padding:'4px 10px', borderRadius:20, background:pillar.light+'80', color:pillar.dark, fontWeight:600 }}>{k}</span>
                ))}
              </div>
            </div>
          )}
          {proc.tools?.length > 0 && (
            <div style={{ background:'#fff', borderRadius:12, padding:18, border:'1px solid #E2E8F0' }}>
              <h3 style={{ fontSize:11, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:12 }}>🛠️ Tools & Systems</h3>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {proc.tools.map((t,i) => (
                  <span key={i} style={{ fontSize:11, padding:'4px 10px', borderRadius:8, background:'#F1F5F9', color:'#334155', border:'1px solid #E2E8F0', fontWeight:600 }}>{t}</span>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// STEP DETAIL PAGE
// ═══════════════════════════════════════════════════════════════
function StepDetailPage({ step, stepNum, proc, pillar, onNavigate }) {
  const subSteps = STEP_DETAILS[proc.id + '.' + step.id] || [];
  const A = 24, W = 200;
  return (
    <div className="fade-in" style={{ flex:1, overflowY:'auto', padding:28 }}>
      {/* Hero */}
      <div style={{
        background:`linear-gradient(135deg, ${pillar.dark} 0%, ${pillar.color} 100%)`,
        borderRadius:14, padding:'24px 28px', marginBottom:22, color:'#fff',
        display:'flex', gap:20, alignItems:'flex-start',
      }}>
        <div style={{
          width:52, height:52, borderRadius:26, background:'rgba(255,255,255,0.18)',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:22, fontWeight:900, color:'#fff', flexShrink:0,
        }}>{stepNum}</div>
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
            <span style={{ background:'rgba(255,255,255,0.18)', fontSize:10, fontWeight:700, padding:'2px 9px', borderRadius:20 }}>{pillar.name}</span>
            <span style={{ fontSize:10, color:'rgba(255,255,255,0.5)' }}>›</span>
            <span style={{ fontSize:10, color:'rgba(255,255,255,0.6)', fontWeight:600 }}>{proc.name}</span>
          </div>
          <h1 style={{ fontSize:22, fontWeight:800, lineHeight:1.2, marginBottom:8 }}>{step.name}</h1>
          <p style={{ fontSize:13, color:'rgba(255,255,255,0.82)', lineHeight:1.65 }}>{step.desc}</p>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:18, marginBottom:18 }}>
        {/* Sub-step chevron flow */}
        {subSteps.length > 0 && (
          <div style={{ gridColumn:'1/-1', background:'#fff', borderRadius:12, padding:20, border:'1px solid #E2E8F0' }}>
            <h3 style={{ fontSize:11, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:16 }}>📋 Step Activities</h3>
            {/* Mini chevrons */}
            <div style={{ display:'flex', overflowX:'auto', marginBottom:0 }}>
              {subSteps.map((ss, i) => {
                const isFirst=i===0, isLast=i===subSteps.length-1;
                const clip = isFirst
                  ? `polygon(0 0, calc(100% - ${A}px) 0, 100% 50%, calc(100% - ${A}px) 100%, 0 100%)`
                  : isLast
                  ? `polygon(${A}px 0, 100% 0, 100% 100%, ${A}px 100%, 0 50%)`
                  : `polygon(${A}px 0, calc(100% - ${A}px) 0, 100% 50%, calc(100% - ${A}px) 100%, ${A}px 100%, 0 50%)`;
                return (
                  <div key={i} style={{
                    width:W, height:72, clipPath:clip,
                    marginLeft: i>0 ? -A : 0, zIndex:subSteps.length-i, position:'relative',
                    background: i%2===0 ? pillar.color : pillar.dark,
                    display:'flex', flexDirection:'column', justifyContent:'center',
                    paddingLeft: isFirst ? 16 : A+8,
                    paddingRight: isLast ? 16 : A+8,
                  }}>
                    <div style={{ fontSize:8, fontWeight:800, color:'rgba(255,255,255,0.5)', letterSpacing:'1px', marginBottom:3 }}>ACTIVITY {i+1}</div>
                    <div style={{ fontSize:11, fontWeight:700, color:'#fff', lineHeight:1.3 }}>{ss.n}</div>
                  </div>
                );
              })}
            </div>
            {/* Activity detail below */}
            <div style={{ display:'flex', borderTop:'1px solid #F1F5F9', marginTop:0 }}>
              {subSteps.map((ss, i) => (
                <div key={i} style={{
                  width:W, flexShrink:0, padding:'10px 14px',
                  borderLeft: i>0 ? '1px solid #F1F5F9' : 'none',
                }}>
                  <div style={{ fontSize:11, color:'#64748B', lineHeight:1.5 }}>{ss.d}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Roles */}
        <div style={{ background:'#fff', borderRadius:12, padding:20, border:'1px solid #E2E8F0' }}>
          <h3 style={{ fontSize:11, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:14 }}>👤 Roles Involved</h3>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {(step.roles||[]).map((r,i) => {
              let found=null, grp=null;
              for (const g of ROLE_GROUPS) { const m=g.roles.find(rl=>rl.title===r); if(m){found=m;grp=g;break;} }
              return (
                <div key={i} onClick={() => found && onNavigate({type:'role',role:found,group:grp})}
                  style={{
                    display:'flex', alignItems:'center', gap:10, padding:'10px 14px',
                    borderRadius:9, border:`1.5px solid ${pillar.color}25`,
                    background: pillar.light+'40', cursor:found?'pointer':'default', transition:'all .12s',
                  }}
                  onMouseEnter={e=>{if(found)e.currentTarget.style.background=pillar.light;}}
                  onMouseLeave={e=>{e.currentTarget.style.background=pillar.light+'40';}}>
                  <span style={{ fontSize:20 }}>{found?.emoji||'👤'}</span>
                  <div>
                    <div style={{ fontSize:12, fontWeight:700, color:pillar.dark }}>{r}</div>
                    {found && <div style={{ fontSize:10, color:'#94A3B8' }}>View role profile →</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Step description + context */}
        <div style={{ background:'#fff', borderRadius:12, padding:20, border:'1px solid #E2E8F0' }}>
          <h3 style={{ fontSize:11, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:14 }}>🔍 Step Context</h3>
          <div style={{ fontSize:13, color:'#334155', lineHeight:1.7, marginBottom:14 }}>{step.desc}</div>
          <div style={{ fontSize:11, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.7px', marginBottom:8 }}>Part of process</div>
          <div style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'6px 12px', borderRadius:8, background:pillar.light+'60', border:`1.5px solid ${pillar.color}30` }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:pillar.color }} />
            <span style={{ fontSize:12, fontWeight:700, color:pillar.dark }}>{proc.name}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// LANDING PAGE
// ═══════════════════════════════════════════════════════════════
function LandingPage({ onViewProcess, onViewRole, onAskQuestion }) {
  const totalProcs  = PILLARS.reduce((a,p) => a + p.processes.length, 0);
  const totalRoles  = ROLE_GROUPS.reduce((a,g) => a + g.roles.length, 0);
  const stats = [
    { n: PILLARS.length, label:'Pillars' },
    { n: totalProcs,     label:'Processes' },
    { n: totalRoles,     label:'Roles' },
  ];
  const options = [
    { icon:'💬', title:'Ask a Question',   desc:'Reach the right supply chain expert for your area — or send a general question to the SC team.', action:onAskQuestion, grad:'linear-gradient(135deg,#7C3AED 0%,#A855F7 100%)', glow:'rgba(124,58,237,0.38)' },
    { icon:'⬡',  title:'View by Process',  desc:'Explore APQC-aligned process maps, step-by-step flows, KPIs, and tools across all six pillars.', action:onViewProcess, grad:'linear-gradient(135deg,#1D4ED8 0%,#3B82F6 100%)', glow:'rgba(29,78,216,0.38)' },
    { icon:'👤', title:'View by Role',     desc:'Find your role, discover the processes you own, and access onboarding guides and JTA materials.',  action:onViewRole,    grad:'linear-gradient(135deg,#065F46 0%,#059669 100%)', glow:'rgba(6,95,70,0.38)' },
  ];
  return (
    <div className="fade-in" style={{ flex:1, overflowY:'auto', background:'linear-gradient(160deg,#0F172A 0%,#1E3A5F 55%,#0F172A 100%)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'48px 24px', minHeight:0 }}>
      <div style={{ width:62, height:62, borderRadius:16, background:'linear-gradient(135deg,#3B82F6,#8B5CF6)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, fontWeight:900, color:'#fff', marginBottom:18, boxShadow:'0 8px 32px rgba(59,130,246,0.45)' }}>L</div>
      <h1 style={{ color:'#fff', fontSize:34, fontWeight:900, letterSpacing:'-0.6px', marginBottom:10, textAlign:'center', lineHeight:1.1 }}>The Link 2.0</h1>
      <p style={{ color:'rgba(255,255,255,0.5)', fontSize:14, textAlign:'center', maxWidth:460, lineHeight:1.65, marginBottom:16 }}>Your single source of truth for Supply Chain process, role, and tool information.</p>
      <div style={{ display:'flex', gap:28, marginBottom:46 }}>
        {stats.map(s => (
          <div key={s.label} style={{ textAlign:'center' }}>
            <div style={{ fontSize:24, fontWeight:900, color:'#fff' }}>{s.n}</div>

  );
}

// AI CHAT — system prompt builder
// ═══════════════════════════════════════════════════════════════
function buildSystemPrompt() {
  let s = `You are the SC Assistant — an AI guide embedded in "The Link 2.0" Supply Chain Process Hub. Help employees find process information, understand roles, discover tools and KPIs, and navigate the knowledge base.

CRITICAL — LINKING RULES:
- When you mention ANY specific process by name, format it EXACTLY as: [Process Name](process:PROCESS_ID)
- When you mention ANY specific role by name, format it EXACTLY as: [Role Name](role:ROLE_ID)
- These become clickable navigation links. Always use them — they are essential for usability.
- Use bullet points for lists. Be concise (under 200 words unless a deep explanation is truly needed).
- Never invent information. If something isn't in the content below, say you don't know.

---\n\nSUPPLY CHAIN PILLARS & PROCESSES:\n\n`;
  for (const pillar of PILLARS) {
    s += `## ${pillar.name} (Lead: ${pillar.lead})\n`;
    for (const p of pillar.processes) {
      s += `[${p.name}](process:${p.id}) — ${p.desc}\n  KPIs: ${p.kpis.join(' · ')}  |  Tools: ${p.tools.join(' · ')}  |  Roles: ${p.roles.join(', ')}\n\n`;
    }
  }
  s += `---\n\nROLES:\n\n`;
  for (const g of ROLE_GROUPS) {
    s += `## ${g.label}\n`;
    for (const r of g.roles) {
      s += `[${r.title}](role:${r.id}) ${r.emoji} — ${r.desc}\n`;
      if (r.responsibilities?.length) s += `  Responsibilities: ${r.responsibilities.join(' · ')}\n`;
      s += '\n';
    }
  }
  return s;
}

// Renders assistant message text: handles **bold**, newlines, and [text](process/role:id) links
function renderMsgText(text, onLinkClick) {
  function parseInline(t) {
    return t.split(/(\*\*[^*]+\*\*)/).flatMap((seg, i) => {
      if (seg.startsWith('**') && seg.endsWith('**')) return [<strong key={i}>{seg.slice(2,-2)}</strong>];
      return seg.split('\n').flatMap((line, j, arr) =>
        j < arr.length-1 ? [<React.Fragment key={`${i}-${j}`}>{line}<br/></React.Fragment>] : [line]
      );
    });
  }
  const out = []; const re = /\[([^\]]+)\]\((process|role):([^\)]+)\)/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push(<span key={`t${last}`}>{parseInline(text.slice(last, m.index))}</span>);
    const [,label,ltype,id] = m;
    out.push(
      <button key={`l${m.index}`} onClick={()=>onLinkClick(ltype,id)} style={{
        display:'inline-flex', alignItems:'center', gap:3, padding:'1px 8px 2px', borderRadius:11,
        fontSize:11, fontWeight:700, verticalAlign:'middle', cursor:'pointer', margin:'0 2px',
        background: ltype==='process' ? '#DBEAFE' : '#D1FAE5',
        color:       ltype==='process' ? '#1D4ED8'  : '#065F46',
        border:`1px solid ${ltype==='process' ? '#93C5FD' : '#6EE7B7'}`,
        transition:'filter .1s',
      }}
      onMouseEnter={e=>e.currentTarget.style.filter='brightness(0.9)'}
      onMouseLeave={e=>e.currentTarget.style.filter=''}>
        {ltype==='process'?'⬡':'👤'} {label} →
      </button>
    );
    last = m.index + m[0].length;
  }
  if (last < text.length) out.push(<span key={`t${last}`}>{parseInline(text.slice(last))}</span>);
  return out;
}

function AIChatPanel({ onClose, onGoto }) {
  const SK = 'link2-api-key';
  const [apiKey,      setApiKey]      = useState(()=>localStorage.getItem(SK)||'');
  const [keyDraft,    setKeyDraft]    = useState('');
  const [editingKey,  setEditingKey]  = useState(false);
  const [messages,    setMessages]    = useState([]);
  const [input,       setInput]       = useState('');
  const [loading,     setLoading]     = useState(false);
  const [error,       setError]       = useState('');
  const endRef   = React.useRef(null);
  const inputRef = React.useRef(null);
  const sysPrompt = useMemo(buildSystemPrompt, []);

  React.useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages, loading]);
  React.useEffect(()=>{ if (apiKey && !editingKey) inputRef.current?.focus(); }, [apiKey, editingKey]);

  function saveKey() {
    const k = keyDraft.trim();
    if (!k) return;
    localStorage.setItem(SK, k);
    setApiKey(k); setKeyDraft(''); setEditingKey(false);
  }

  async function send(text) {
    const msg = text ?? input.trim();
    if (!msg || loading) return;
    const next = [...messages, {role:'user', content:msg}];
    setMessages(next); setInput(''); setLoading(true); setError('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:1024, system:sysPrompt, messages:next }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      setMessages(prev=>[...prev, {role:'assistant', content:data.content[0].text}]);
    } catch(e) {
      setError(e.message||'Something went wrong. Check your API key.');

  function handleLink(type, id) {
    if (type==='process') {

    if (type==='role') {

            <div style={{fontSize:15,fontWeight:800,color:'#fff'}}>SC Assistant</div>

          </div>
          <button onClick={onClose} style={{color:'rgba(255,255,255,0.7)',fontSize:18,padding:4,lineHeight:1}}>✕</button>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:36}}>
          <div style={{fontSize:44,marginBottom:16}}>🔑</div>
          <h2 style={{fontSize:18,fontWeight:800,color:'#0F172A',textAlign:'center',marginBottom:10}}>Enter your Anthropic API Key</h2>
          <p style={{fontSize:12,color:'#64748B',textAlign:'center',lineHeight:1.65,marginBottom:24,maxWidth:300}}>
            The SC Assistant runs on the Claude API. Your key is stored only in your browser's local storage and sent only to Anthropic.
          </p>

            Save &amp; Start Chatting →

        {/* Messages */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 16px 8px'}}>

function FeedbackBar({ view, currentPage }) {
  const [open, setOpen] = useState(false);

  function getOwner() {
    if (currentPage?.type === 'pillar' || currentPage?.type === 'process' || currentPage?.type === 'processFlow' || currentPage?.type === 'stepDetail') {
      const p = currentPage.pillar;
      return { name: p.lead, email:`${p.id}-lead@yourcompany.com` };

    if (currentPage?.type === 'role') {
      const g = currentPage.group;
      return { name: g.label+' Lead', email:`${g.pillarId}-lead@yourcompany.com` };

    return { name:'The Link 2.0 Team', email:'thelink@yourcompany.com' };

  const owner = getOwner();
  function handleSend() {

              </div>
              <button onClick={()=>setOpen(false)} style={{ fontSize:18, color:'#94A3B8', padding:4, lineHeight:1 }}>✕</button>
            </div>
            <textarea autoFocus value={msg} onChange={e=>setMsg(e.target.value)}

function App() {
  const [view, setView]             = useState('home');
  const [navStack, setNavStack]     = useState([]);
  const [showAIChat, setShowAIChat] = useState(false);

  function handleNavigate(item)  { setNavStack(prev => [...prev, item]); }
  function handleViewChange(v)   { setView(v); setNavStack([]); }

  // Used by AI chat links — sets view AND replaces navStack with a single destination
  function handleGoto(viewName, item) { setView(viewName); setNavStack([item]); }

  function updateCurrentPage(updates) {
    setNavStack(prev => {
      const n = [...prev];
      n[n.length-1] = { ...n[n.length-1], ...updates };
      return n;
    });
  }

  function handleCrumbClick(idx) {
    if (idx === -1) { setView('home'); setNavStack([]); return; }
    if (idx === 0)  { setNavStack([]); return; }
    setNavStack(prev => prev.slice(0, idx + 1));
  }

  const currentPage = navStack[navStack.length - 1] || null;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      {showAIChat && <AIChatPanel onClose={()=>setShowAIChat(false)} onGoto={handleGoto} />}

      {/* Persistent floating AI button — visible on every page */}
      {!showAIChat && (
        <button onClick={()=>setShowAIChat(true)} style={{
          position:'fixed', bottom:44, right:16, zIndex:200,
          background:'linear-gradient(135deg,#7C3AED,#A855F7)', color:'#fff',
          border:'none', borderRadius:24, padding:'9px 18px',
          fontSize:12, fontWeight:700, cursor:'pointer',
          display:'flex', alignItems:'center', gap:7,
          boxShadow:'0 4px 20px rgba(124,58,237,0.45)', transition:'transform .15s, box-shadow .15s',
        }}
        onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 28px rgba(124,58,237,0.6)';}}
        onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 4px 20px rgba(124,58,237,0.45)';}}>
          ✦ Ask AI
        </button>
      )}

      <Header navStack={navStack} view={view} onCrumbClick={handleCrumbClick} />
      {view !== 'home' && <TabBar view={view} onViewChange={handleViewChange} />}

      <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        {view === 'home' && (
          <LandingPage
            onViewProcess={() => handleViewChange('process')}
            onViewRole={() => handleViewChange('role')}
            onAskQuestion={() => setShowAIChat(true)}
          />
        )}
        {!currentPage && view === 'process' && (
          <ProcessMapView onNavigate={handleNavigate} />
        )}
        {!currentPage && view === 'role' && (
          <RoleMapView onNavigate={handleNavigate} />
        )}
        {currentPage?.type === 'pillar' && (
          <PillarPage pillar={currentPage.pillar} onNavigate={handleNavigate} />
        )}
        {currentPage?.type === 'process' && (
          <ProcessDetailPage
            proc={currentPage.proc}
            pillar={currentPage.pillar}
            onNavigateToRole={handleNavigate}
            onViewFlow={() => handleNavigate({ type:'processFlow', proc:currentPage.proc, pillar:currentPage.pillar })}
          />
        )}
        {currentPage?.type === 'processFlow' && (
          <ProcessFlowPage
            proc={currentPage.proc}
            pillar={currentPage.pillar}
            onNavigate={handleNavigate}
            onUpdateCurrent={updateCurrentPage}
          />
        )}
        {currentPage?.type === 'stepDetail' && (
          <StepDetailPage
            step={currentPage.step}
            stepNum={currentPage.stepNum}
            proc={currentPage.proc}
            pillar={currentPage.pillar}
            onNavigate={handleNavigate}
          />
        )}
        {currentPage?.type === 'role' && (
          <RoleDetailPage
            role={currentPage.role}
            group={currentPage.group}
            onNavigateToProcess={handleNavigate}
          />
        )}
      </div>

      <FeedbackBar view={view} currentPage={currentPage} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
